    <style>
        /* ─ Reset & base ─────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0e;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─ BACKGROUND full-page ─────────────────────────── */

            inset: 0;
            z-index: 0;
            background: url('IMG/nguyezcom-bg.jpg') center/cover no-repeat;
        }

        /* Lớp phủ tối để nội dung nổi bật */

            content: '';

            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(2px);

        }

            top: 0;

            border-bottom: 1px solid rgba(255, 255, 255, 0.1);

            margin: 0 auto;

            align-items: center;

        }

            align-items: center;
            gap: 9px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .nav-brand img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 200, 83, 0.55);
        }

        .nav-brand span {
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #fff 40%, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        /* Nav links */

            display: flex;

        }

            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.78rem;

        .nav-menu a:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-1px);
        }

        .nav-menu .n-yt {

        }

        .nav-menu .n-dc {
            color: #7289da;
        }

        .nav-menu .n-mail {

        }

        }

        .nav-menu .n-donate {

            color: #fff;
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(0, 200, 83, 0.4);
        }

        .nav-menu .n-donate:hover {
            background: linear-gradient(135deg, #00a843, #008f38);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 200, 83, 0.5);
        }

        /* ─ MAIN CONTENT WRAPPER ─────────────────────────── */
        .main-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ─ HERO ─────────────────────────────────────────── */
        .hero {
            text-align: center;
            padding: 60px 1rem 48px;
        }

        .hero-avt {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(0, 200, 83, 0.65);
            box-shadow: 0 0 0 6px rgba(0, 200, 83, 0.1), 0 8px 28px rgba(0, 0, 0, 0.5);
            margin-bottom: 18px;
        }

        .hero h1 {
            font-size: clamp(1.3rem, 3.5vw, 1.9rem);
            font-weight: 900;
            letter-spacing: -0.8px;

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

        .hero p {

        }

            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 740px;
            margin: 0 auto 70px;
        }

        @media (max-width: 500px) {
            .card-row {
                grid-template-columns: 1fr;
                max-width: 320px;
            }

        /* ─ PROFILE CARD 5 (giống gốc, cải tiến 3D) ──────── */
        .profile-card-5 {
            position: relative;
            border-radius: 18px;
            overflow: visible;
            /* cho ảnh nổi lên */
            background: transparent;
            border: none;
            transition: transform 0.28s ease;
        }

        .profile-card-5:hover {
            transform: translateY(-6px);
        }

        /* Phần ảnh QR nổi trên thanh info */
        .profile-card-5 .card-img-block {
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            box-shadow:
                0 2px 0 rgba(255, 255, 255, 0.08) inset,
                0 20px 50px rgba(0, 0, 0, 0.65),
                0 4px 12px rgba(0, 0, 0, 0.35);
            padding-bottom: 6px;
        }

        /* Gradient overlay trên ảnh QR theo màu ngân hàng */
        .bank.vcb .card-img-block {
            background: linear-gradient(155deg, #1aff7a, #00c853 50%, #006b22);
        }

        .bank.mbbank .card-img-block {
            background: linear-gradient(155deg, #ffb347, #f97316 50%, #c2440a);
        }

        .profile-card-5 .card-img-block img.card-img-top {
            width: 100%;
            border-radius: 15px;
            /* outer 18px - padding 3px = khớp viền */
            display: block;
            padding: 3px 3px 0;
            transform: perspective(600px) rotateX(1.5deg);
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.3);
        }

        /* Thanh info bên dưới */
        .profile-card-5 .card-body {
            border-radius: 0 0 18px 18px;
            margin-top: -6px;
            position: relative;
            z-index: 1;
            padding: 18px 18px 20px !important;

        .bank.vcb .card-body {
            background: linear-gradient(160deg, #0d2216, #081510);
            border: 1px solid rgba(0, 200, 83, 0.25);
            border-top: none;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        .bank.mbbank .card-body {
            background: linear-gradient(160deg, #1e1008, #120a03);
            border: 1px solid rgba(249, 115, 22, 0.28);
            border-top: none;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        /* Tên ngân hàng */
        .card-title {
            font-size: 0.72rem !important;
            font-weight: 700 !important;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 3px !important;

        .bank.vcb .card-title {
            color: #4ade80;
        }

        .bank.mbbank .card-title {
            color: #fdba74;
        }

        /* Tên chủ TK */
        .card-text-1 {

            color: rgba(255, 255, 255, 0.78);

        /* Input + button cùng hàng */
        .stk-row {

            align-items: center;
            gap: 8px;

        }

        .card-body input[type="text"] {

            border-radius: 9px;

            font-size: 0.88rem;

            font-family: 'Inter', monospace;
            letter-spacing: 0.3px;
            outline: none;
            text-align: center;
        }

        /* Nút copy — màu theo ngân hàng */
        .card-body button {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: none;
            border-radius: 9px;

            font-size: 0.76rem;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            cursor: pointer;

            background: linear-gradient(135deg, #00c853, #00a843);

        }

        .bank.mbbank .card-body button:hover {

        /* ─ MESSAGE SECTION (placeholder) ───────────────── */
        .msg-section {

        .sec-head {

        .sec-head h2 {

            background: linear-gradient(135deg, #fff 40%, #6ee7b7);

            color: rgba(255, 255, 255, 0.55);

        .divider {

            border-radius: 99px;
            background: linear-gradient(90deg, #00c853, #f97316);
            margin: 0 auto 1.4rem;
        }

        .msg-placeholder {
            background: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.11);
            border-radius: 20px;
            padding: 44px 2rem;
            text-align: center;

        .tg-icon {
            width: 52px;

            background: linear-gradient(135deg, #229ed9, #0a8ec9);
            border-radius: 14px;

            align-items: center;
            justify-content: center;

        }

        .badge-soon {

            background: rgba(34, 158, 217, 0.1);
            border: 1px solid rgba(34, 158, 217, 0.26);
            border-radius: 999px;
            padding: 3px 11px;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #5bc8f5;
            margin-bottom: 0.8rem;
        }

        .msg-placeholder h3 {
            font-size: 0.98rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.82);
            margin-bottom: 7px;
        }

        .msg-placeholder p {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.34);
            line-height: 1.65;
            max-width: 300px;
            margin: 0 auto;
        }

        /* ─ FOOTER ───────────────────────────────────────── */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            padding: 1.4rem 1rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.22);
            font-size: 0.74rem;
        }

        footer a {
            color: rgba(255, 255, 255, 0.22);
            text-decoration: none;
        }

        /* ─ TELEGRAM FORM ─────────────────────────────────── */
        .tg-form-wrap {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 28px 28px 24px;
            backdrop-filter: blur(8px);
        }

        .tg-input {
            display: block;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 11px;
            padding: 12px 16px;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            color: #fff;
            outline: none;
            transition: border-color 0.18s;
            margin-bottom: 12px;
            resize: none;
        }

        .tg-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .tg-input:focus {
            border-color: rgba(0, 200, 83, 0.5);
            background: rgba(255, 255, 255, 0.09);
        }

        .tg-textarea {
            min-height: 110px;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #00c853, #00a843);
            color: #fff;
            border: none;
            border-radius: 11px;
            padding: 11px 26px;
            font-size: 0.88rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.18s ease;
            margin-top: 4px;
        }

        .tg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 200, 83, 0.4);
        }

        .tg-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .tg-result {
            margin-top: 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            padding: 0;
            transition: all 0.2s;
        }

        .tg-result.ok {
            color: #4ade80;
            padding: 10px 14px;
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.2);
        }

        .tg-result.err {
            color: #f87171;
            padding: 10px 14px;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        /* ─ RESPONSIVE nav ───────────────────────────────── */
        @media (max-width: 560px) {
            .nav-menu a span {
                display: none;
            }

            .nav-menu a {
                padding: 7px 9px;
            }
        }
    </style>
</head>

<body>

    <!-- ══ BACKGROUND ══ -->
    <div class="bg-fixed"></div>

    <div class="page-wrap">

        <!-- ══ NAVBAR ══ -->

                        <div class="card profile-card-5">
                            <div class="card-img-block">
                                <img class="card-img-top" src="IMG/VCB-QR.jpg" alt="QR Vietcombank">
                            </div>
                            <div class="card-body">
                                <div class="stk-row">

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>

    <script>
        function copySTK(id, btn) {
            var val = document.getElementById(id).value;
            navigator.clipboard.writeText(val).then(function () {
                var orig = btn.innerHTML;
                btn.classList.add('copied');
                btn.innerHTML = '<i class="fas fa-check"></i> Đã copy!';
                setTimeout(function () {
                    btn.classList.remove('copied');
                    btn.innerHTML = orig;
                }, 2000);
            });
        }
        async function sendTelegram(e) {
            e.preventDefault();
            const btn = document.getElementById('tgBtn');
            const result = document.getElementById('tgResult');
            const name = document.getElementById('tgName').value.trim();
            const msg = document.getElementById('tgMsg').value.trim();
            if (!msg) return;

            // ── Đã cập nhật Worker URL ──────────
            const WORKER_URL = 'https://damp-smoke-deb8.ncn1992vn.workers.dev';
            // ─────────────────────────────────────────────────

            const text = name
                ? `\uD83D\uDCAC <b>${name}</b>\n\n${msg}\n\n<i>— donate.nguyez.com</i>`
                : `\uD83D\uDCAC <i>Ẩn danh</i>\n\n${msg}\n\n<i>— donate.nguyez.com</i>`;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>&nbsp; Đang gửi...';
            result.className = 'tg-result';
            result.textContent = '';

            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });
                const data = await res.json();
                if (data.ok) {
                    result.className = 'tg-result ok';
                    result.innerHTML = '✅ Tin nhắn đã gửi thành công!';
                    document.getElementById('tgForm').reset();
                } else {
                    throw new Error(data.description);
                }
            } catch (err) {
                result.className = 'tg-result err';
                result.innerHTML = '❌ Gửi thất bại. Vui lòng thử lại.';
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="far fa-paper-plane"></i>&nbsp; Gửi lời nhắn';
            }
        }
    </script>
